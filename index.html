<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css?family=Rubik:wght@300..500&display=swap" rel="stylesheet">
  <link href="./styles.css" rel="stylesheet">
  <script defer src="./main.js"></script>
  
  <title>Frontend Mentor | Time tracking dashboard</title>
</head>
<body>
  <div class="container">
    <div class="person">
      <div class="personTitle">
        <img src="images/image-jeremy.png" width="75px" height="75px"/>
        <p id="reportFor">Report for<br>
        <span id="personName">Jeremy Robson</span></p>
      </div>
      <div id="buttons">
        <button id="dailyButton" disabled>Daily</button>
        <button id="weeklyButton">Weekly</button>
        <button id="monthlyButton">Monthly</button>
      </div>
    </div>
    <div class="work">
      <div id="workInfo">
        <!--<span class="title">Work</span>
        <a>...</a><br>-->
        <p class="title">Work<a>...</a></p>
        <span id="workCurrent">5hrs</span>
        <span id="workPrev">Yesterday - 7hrs</span>
      </div>
      
    </div>
    <div class="play">
      <div id="playInfo">
        <p class="title">Play<a>...</a></p>
        
        <span id="playCurrent">1hr</span>
        <span id="playPrev">Yesterday - 2hrs</span>
      </div>
      
    </div>
    <div class="study">
      <div id="studyInfo">
        <p class="title">Study<a>...</a></p>
        
        <span id="studyCurrent">0hrs</span>
        <span id="studyPrev">Yesterday - 1hr</span>
      </div>
    </div>
    <div class="exercise">
      <div id="exerciseInfo">
        <p class="title">Exercise<a>...</a></p>
        
        <span id="exerciseCurr">1hr</span>
        <span id="exercisePrev">Yesterday - 1hr</span>
      </div>
    </div>
    <div class="social">
      <div id="socialInfo">
        <p class="title">Social<a>...</a></p>
        
        <span id="socialCurr">1hr</span>
        <span id="socialPrev">Yesterday - 3hrs</span>
      </div>
      
    </div>
    <div class="selfCare">
      <div id="selfInfo">
        <p class="title">Self Care<a>...</a></p>
        
        <span id="selfCurrent">0hrs</span>
        <span id="selfPrev">Yesterday - 1hr</span>
      </div>
      
    </div>
  </div>

</body>
</html>
