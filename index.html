<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css?family=Rubik:wght@100..900&display=swap" rel="stylesheet">
  <link href="./styles.css" rel="stylesheet">
  <script defer src="./main.js"></script>
  
  <title>Frontend Mentor | Time tracking dashboard</title>
</head>
<body>
  <div class="container">
    <div class="person">
      <div class="personTitle">
        <img src="./images/image-jeremy.png" width="75px" height="75px" alt="jeremyRobson"/>
        <p id="reportFor">Report for<br>
        <span id="personName">Jeremy Robson</span></p>
      </div>
      <div id="buttons">
        <button id="dailyButton" disabled>Daily</button>
        <button id="weeklyButton">Weekly</button>
        <button id="monthlyButton">Monthly</button>
      </div>
    </div>
    <div class="work">
      <div id="workInfo">
        <div class="topInfo">
          <span class="title">Work</span>
          <span class="dots">&ctdot;</span>
        </div>
        <div class="botInfo">
          <span id="workCurrent">5hrs</span>
          <span id="workPrev">Yesterday - 7hrs</span>
        </div>
        
      </div>
      
    </div>
    <div class="play">
      <div id="playInfo">
        <div class="topInfo">
          <span class="title">Play</span>
          <span class="dots">&ctdot;</span>
        </div>
        <div class="botInfo">
          <span id="playCurrent">1hr</span>
          <span id="playPrev">Yesterday - 2hrs</span>
        </div>
      </div>
      
    </div>
    <div class="study">
      <div id="studyInfo">
        <div class="topInfo">
          <span class="title">Study</span>
          <span class="dots">&ctdot;</span>
        </div>
        <div class="botInfo">
          <span id="studyCurrent">0hrs</span>
          <span id="studyPrev">Yesterday - 1hr</span>
        </div>
      </div>
    </div>
    <div class="exercise">
      <div id="exerciseInfo">
        <div class="topInfo">
          <span class="title">Exercise</span>
          <span class="dots">&ctdot;</span>
        </div>
        <div class="botInfo">
          <span id="exerciseCurrent">1hr</span>
          <span id="exercisePrev">Yesterday - 1hr</span>
        </div>
      </div>
    </div>
    <div class="social">
      <div id="socialInfo">
        <div class="topInfo">
          <span class="title">Social</span>
          <span class="dots">&ctdot;</span>
        </div>
        <div class="botInfo">
          <span id="socialCurrent">1hr</span>
          <span id="socialPrev">Yesterday - 3hrs</span>
        </div>
      </div>
      
    </div>
    <div class="selfCare">
      <div id="selfInfo">
        <div class="topInfo">
          <span class="title">Self Care</span>
          <span class="dots">&ctdot;</span>
        </div>
        <div class="botInfo">
          <span id="selfCurrent">0hrs</span>
          <span id="selfPrev">Yesterday - 1hr</span>
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
